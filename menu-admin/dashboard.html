<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Standfix Admin Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      padding: 20px;
    }
    h1 { text-align: center; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    button {
      background: #216f00;
      border: none;
      padding: 10px 16px;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 18px;
      display: flex;
      gap: 15px;
      box-shadow: 0 2px 8px rgba(0, 121, 26, 0.1);
    }
    .card img {
      width: 120px;
      height: 90px;
      object-fit: cover;
      border-radius: 5px;
    }
    .actions button { margin-right: 10px; }
  </style>
</head>

<body>

  <h1>Standfix Kitchen Menu Admin</h1>

  <div class="top-bar">
    <button onclick="addNew()">➕ Add New Menu Item</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="menuList"></div>

  <!-- Firebase Import -->
  <script type="module">
    import { db } from "../firebase.js";
    import {
      collection,
      getDocs,
      deleteDoc,
      doc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Protect dashboard
    if (!localStorage.getItem("standfix_admin")) {
      window.location.href = "/menu-admin/admin-login.html";
    }

    const menuList = document.getElementById("menuList");

    async function loadMenu() {
      menuList.innerHTML = "<h3>Loading...</h3>";

      const ref = collection(db, "menu");
      const snapshot = await getDocs(ref);

      menuList.innerHTML = "";

      snapshot.forEach((docItem) => {
        const data = docItem.data();

        menuList.innerHTML += `
          <div class="card">
            <img src="${data.image}" alt="">
            <div>
              <h3>${data.title}</h3>
              <p>${data.description}</p>

              <div class="actions">
                <button onclick="editMenu('${docItem.id}')">Edit</button>
                <button onclick="deleteMenu('${docItem.id}')">Delete</button>
              </div>
            </div>
          </div>
        `;
      });
    }

    loadMenu();

    // ADD NEW
    window.addNew = function () {
    window.location.href = "add-edit.html";

};

// Add new
window.addNew = function () {
  window.location.href = "add-edit.html";
};

// Edit
window.editMenu = function (id) {
  window.location.href = "add-edit.html?id=" + id;
};

// Logout
window.logout = function () {
  localStorage.removeItem("standfix_admin");
  window.location.href = "admin-login.html";
};

  </script>

</body>
</html>
